{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="relative min-h-screen py-24 pb-32 overflow-hidden" style="padding-bottom: max(8rem, calc(env(safe-area-inset-bottom, 0px) + 6rem));">
    <!-- Tour background image (dimmed but visible) -->
    <div class="absolute inset-0 z-0">
        {% if tour_settings.background_image %}
        <img src="{{ tour_settings.background_image.url }}" alt=""
            class="w-full h-full object-cover object-center brightness-[0.35] contrast-105">
        {% else %}
        <img src="{% static 'images/mboka doba.png' %}" alt=""
            class="w-full h-full object-cover object-center brightness-[0.35] contrast-105">
        {% endif %}
        <div class="absolute inset-0 bg-black/50"></div>
    </div>

    <div class="relative z-10 max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <!-- Back to Home (hidden on mobile) -->
        <a href="{% url 'index' %}" hx-boost="false" data-no-boost class="hidden md:inline-flex items-center gap-2 text-white/60 hover:text-white transition-colors text-xs font-bold tracking-widest uppercase mb-8">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Back to Home
        </a>

        <!-- Section header -->
        <header class="text-center mb-20 relative">
            <h1 class="font-display text-[15vw] leading-[0.8] font-bold tracking-tighter text-white mb-6 uppercase drop-shadow-2xl opacity-100 animate-fade-in-up"
                style="animation-delay: 0.1s;">
                SHOWS
            </h1>
            <div
                class="w-full max-w-xs h-px bg-gradient-to-r from-transparent via-white/40 to-transparent mx-auto mb-8">
            </div>
            <p class="text-white/80 text-lg md:text-xl font-light tracking-[0.5em] uppercase opacity-100 animate-fade-in-up"
                style="animation-delay: 0.3s;">
                TUPATANE
            </p>
        </header>

        <div id="tour-list">
            {% include 'web/partials/tour_list.html' with tour_dates=tour_dates %}
        </div>

        <!-- Home Button at Bottom -->
        <div class="flex justify-center mt-16 mb-8 pb-8" style="padding-bottom: max(2rem, calc(env(safe-area-inset-bottom, 0px) + 2rem));">
            <a href="{% url 'index' %}" hx-boost="false" data-no-boost class="inline-flex items-center gap-2 px-6 py-3 bg-toxicAccent hover:bg-white text-white hover:text-black font-display font-bold text-sm uppercase tracking-widest transition-all duration-300 transform hover:scale-105 active:scale-95 shadow-lg hover:shadow-xl">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                HOME
            </a>
        </div>
    </div>
</div>
{% endblock %}
