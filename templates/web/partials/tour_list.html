{% load tz %}
<div class="space-y-4">
    {% for gig in tour_dates %}
    <div
        class="group relative flex flex-col md:flex-row items-center justify-between p-6 border border-white/5 bg-black/20 backdrop-blur-sm hover:bg-white/5 hover:border-toxicAccent/50 transition-all duration-300">

        <!-- Date Block -->
        <div class="flex items-center gap-6 w-full md:w-auto mb-4 md:mb-0">
            <div
                class="flex flex-col items-center justify-center w-16 h-16 border border-white/10 bg-white/5 group-hover:bg-toxicAccent group-hover:text-white transition-colors">
                <span class="text-xs font-bold uppercase tracking-widest">{{ gig.date|localtime|date:"M" }}</span>
                <span class="text-2xl font-display font-bold leading-none">{{ gig.date|localtime|date:"d" }}</span>
            </div>

            <div class="text-left">
                <h3
                    class="text-2xl font-display font-bold text-white group-hover:text-toxicAccent transition-colors uppercase leading-none mb-1">
                    {{ gig.venue }}
                </h3>
                <div class="flex items-center gap-2 flex-wrap">
                    <span class="w-1.5 h-1.5 rounded-full bg-toxicAccent flex-shrink-0"></span>
                    <p class="text-white/60 text-sm font-medium tracking-wide uppercase">{{ gig.location }}</p>
                    <a href="{% if gig.map_link %}{{ gig.map_link }}{% else %}https://www.google.com/maps/search/?api=1&query={{ gig.venue|urlencode }}+{{ gig.location|urlencode }}{% endif %}" target="_blank" rel="noopener noreferrer"
                        class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-white/10 hover:bg-toxicAccent text-white/60 hover:text-white transition-all duration-300"
                        aria-label="Get directions to {{ gig.venue }}">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                    </a>
                </div>
            </div>
        </div>

        <!-- Action -->
        <div class="w-full md:w-auto text-center md:text-right pl-0 md:pl-4">
            {% if gig.is_sold_out %}
            <span
                class="inline-block px-4 py-2 bg-transparent text-white/30 text-xs font-bold tracking-[0.2em] border border-white/10 select-none">
                SOLD OUT
            </span>
            {% else %}
            <a href="{{ gig.ticket_link }}" target="_blank" rel="noopener noreferrer"
                class="inline-block w-full md:w-auto px-8 py-3 bg-white text-black text-sm font-bold tracking-[0.2em] hover:bg-toxicAccent hover:text-white transition-all duration-300 transform group-hover:-translate-y-1">
                GET TICKETS
            </a>
            {% endif %}
        </div>
    </div>
    {% empty %}
    <div class="text-center py-32 border border-white/5 bg-black/20 backdrop-blur-sm">
        <h3 class="font-display text-4xl text-white/20 uppercase tracking-widest mb-4">No Dates Announced</h3>
        <p class="text-white/40 text-sm tracking-widest uppercase">Sign up for alerts</p>
    </div>
    {% endfor %}
</div>
